<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The solar system</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: white;
            background-image: url('./images/solarsystem.jpg');
            background-size: cover;
            background-position: center;
            font-size: 4rem;
            flex-grow: 10;
        }

        nav {
            flex-grow: 9;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
        }

        #earth {
            background-image: url('./images/earth.jpg');
        }
        #earth::before {
            background-color: green;
        }
        #earth:hover::before {
            background-color: blue;
        }

        #mars {
            background-image: url('./images/mars.png');
        }
        #mars::before {
            background-color: rgb(143, 0, 0);
        }
        #mars:hover::before {
            background-color: red;
        }

        #moon {
            background-image: url('./images/moon.jpg');
        }
        #moon::before {
            background-color: grey;
        }
        #moon:hover::before {
            background-color: rgb(87, 87, 87);
        }

        #jupiter {
            background-image: url('./images/jupiter.jpg');
        }
        #jupiter::before {
            background-color: rgb(82, 67, 44);
        }
        #jupiter:hover::before {
            background-color: rgb(161, 117, 59);
        }

        a {
            width: 300px;
            height: 150px;
            background-position: center;
            background-size: cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            font-size: 3rem;
        }

        a::before {
            content: '';
            position: absolute;
            left: -20px;
            top: -20px;
            width: inherit;
            height: inherit;
            z-index: -1;
            transition: all cubic-bezier(0.165, 0.84, 0.44, 1) .5s;
        }

        a:hover::before {
            transform: translateX(40px);
        }
    </style>
</head>
<body>
    <h1>The Solar System</h1>
    <nav>
        <a id="earth" href="earth.html">Earth</a>
        <a id="mars" href="mars.html">Mars</a>
        <a id="moon" href="moon.html">Moon</a>
        <a id="jupiter" href="jupiter.html">Jupiter</a>
    </nav>
</body>
</html>
